version: "3.8"

services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: insiteiq-frontend
    ports:
      - "127.0.0.1:3110:80"
    depends_on:
      - api
    env_file:
      - .env
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: insiteiq-api
    ports:
      - "127.0.0.1:4110:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - mongo
      - redis
    env_file:
      - .env
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: insiteiq-mongo
    ports:
      - "127.0.0.1:6110:27017"
    volumes:
      - mongo_data:/data/db
    env_file:
      - .env
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: insiteiq-redis
    ports:
      - "127.0.0.1:6111:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
